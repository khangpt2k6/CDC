<script>
(function () {
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var n = 128450;
  // downstream stages trail upstream to show in-flight batching / commit lag
  var cells = [
    { id: 'cnt-pg',     lag: 0   },
    { id: 'cnt-kafka',  lag: 7   },
    { id: 'cnt-worker', lag: 260 },
    { id: 'cnt-click',  lag: 540 }
  ];
  function fmt(x) { return x.toLocaleString('en-US'); }
  function render() {
    for (var i = 0; i < cells.length; i++) {
      var el = document.getElementById(cells[i].id);
      if (el) el.textContent = fmt(Math.max(0, n - cells[i].lag));
    }
  }
  render();
  if (!reduce) {
    setInterval(function () {
      n += Math.floor(Math.random() * 7) + 2;
      render();
    }, 140);
  }
})();
</script>
