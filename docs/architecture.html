<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDC Pipeline - System Architecture</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0e16; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  svg { width: 100%; height: 100vh; display: block; }
  @page { size: landscape; margin: 0; }
  @media print { svg { height: 100%; } }
</style>
</head>
<body>
<svg viewBox="0 0 1280 700" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#46586e"/>
    </marker>
    <marker id="arrd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6a5a52"/>
    </marker>
    <radialGradient id="bg" cx="30%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#16202e"/>
      <stop offset="62%" stop-color="#0a0e16"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .box   { fill:#0e1521; stroke-width:1.6; animation:breathe 3.4s ease-in-out infinite; }
      .b-pg{stroke:#4a90d9}.b-dbz{stroke:#d98a3a}.b-kafka{stroke:#c14f4f}
      .b-go{stroke:#4fb3c1}.b-click{stroke:#d9c14a}.b-graf{stroke:#d9663a}.b-prom{stroke:#c1564a}
      .t     { fill:#e6edf3; font-weight:700; }
      .s     { fill:#8b98a9; }
      .lbl   { fill:#5d6b7d; font-weight:700; letter-spacing:2.5px; }
      .edge  { fill:#9aa7b8; }
      .mono  { font-family:"SF Mono",ui-monospace,"Cascadia Code",Menlo,monospace; }
      .link  { fill:none; stroke:#46586e; stroke-width:1.7; }
      .dash  { fill:none; stroke:#6a5a52; stroke-width:1.7; stroke-dasharray:6 5;
               animation:march 0.7s linear infinite; }
      .cont  { fill:#101826; stroke:#263244; stroke-width:1.2; }
      .stage { fill:#0a111c; stroke:#263244; stroke-width:1; }
      .evt   { fill:#74e0ef; }
      .evt2  { fill:#ffd27a; }
      text   { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
      @keyframes march   { to { stroke-dashoffset:-22; } }
      @keyframes breathe { 0%,100%{ stroke-opacity:.78 } 50%{ stroke-opacity:1 } }
      @media (prefers-reduced-motion: reduce) {
        .box{animation:none} .dash{animation:none}
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="700" fill="url(#bg)"/>

  <!-- ===== title ===== -->
  <text x="36" y="46" class="t" font-size="25">CDC Pipeline - System Architecture</text>
  <text x="36" y="70" class="s" font-size="13">Live simulation: change events stream from Postgres, branch across Kafka topics, merge in the Go worker, and land in ClickHouse for Grafana.</text>

  <!-- ===== column headers ===== -->
  <text x="119"  y="118" class="lbl" font-size="11" text-anchor="middle">SOURCE</text>
  <text x="334"  y="118" class="lbl" font-size="11" text-anchor="middle">CAPTURE</text>
  <text x="560"  y="118" class="lbl" font-size="11" text-anchor="middle">TRANSPORT</text>
  <text x="938"  y="118" class="lbl" font-size="11" text-anchor="middle">PROCESSING</text>
  <text x="1164" y="118" class="lbl" font-size="11" text-anchor="middle">STORAGE / SERVING</text>

  <!-- ===== connectors (under nodes) ===== -->
  <path class="link" d="M202,185 H251" marker-end="url(#arr)"/>
  <path class="link" d="M417,185 H466" marker-end="url(#arr)"/>
  <path class="link" d="M586,185 H611 V140 H636" marker-end="url(#arr)"/>
  <path class="link" d="M586,185 H611 V230 H636" marker-end="url(#arr)"/>
  <path class="link" d="M786,140 H815 V185 H844" marker-end="url(#arr)"/>
  <path class="link" d="M786,230 H815 V185 H844" marker-end="url(#arr)"/>
  <path class="link" d="M1032,185 H1056 V181 H1080" marker-end="url(#arr)"/>
  <path class="link" d="M1164,212 V240" marker-end="url(#arr)"/>
  <path class="link" d="M938,227 V300 H670 V330" marker-end="url(#arr)"/>
  <path class="dash" d="M670,450 V520 H460 V556" marker-end="url(#arrd)"/>
  <path class="dash" d="M560,585 H1164 V304" marker-end="url(#arrd)"/>

  <!-- edge labels -->
  <text x="226"  y="178" class="edge mono" font-size="10" text-anchor="middle">pgoutput</text>
  <text x="441"  y="178" class="edge" font-size="10" text-anchor="middle">produce</text>
  <text x="1054" y="170" class="edge" font-size="10" text-anchor="middle">batch INSERT</text>
  <text x="1178" y="230" class="edge mono" font-size="10" text-anchor="start">FINAL</text>
  <text x="468"  y="538" class="edge mono" font-size="10" text-anchor="start">scrape /metrics</text>
  <text x="860"  y="578" class="edge" font-size="10" text-anchor="middle">visualize pipeline health</text>

  <!-- ===== nodes ===== -->
  <rect class="box b-pg" x="36" y="150" width="166" height="70" rx="11"/>
  <text x="119" y="182" class="t" font-size="15" text-anchor="middle">PostgreSQL</text>
  <text x="119" y="201" class="s" font-size="10.5" text-anchor="middle">OLTP source · cdc_pub</text>

  <rect class="box b-dbz" x="251" y="150" width="166" height="70" rx="11"/>
  <text x="334" y="182" class="t" font-size="15" text-anchor="middle">Debezium</text>
  <text x="334" y="201" class="s" font-size="10.5" text-anchor="middle">Kafka Connect · snapshot+stream</text>

  <rect class="box b-kafka" x="466" y="150" width="120" height="70" rx="11"/>
  <text x="526" y="182" class="t" font-size="15" text-anchor="middle">Kafka</text>
  <text x="526" y="201" class="s" font-size="10.5" text-anchor="middle">KRaft log</text>

  <rect class="box b-kafka" x="636" y="118" width="150" height="44" rx="9"/>
  <text x="711" y="145" class="t mono" font-size="12" text-anchor="middle">topic: orders</text>

  <rect class="box b-kafka" x="636" y="208" width="150" height="44" rx="9"/>
  <text x="711" y="235" class="t mono" font-size="12" text-anchor="middle">topic: customers</text>

  <rect class="box b-go" x="844" y="143" width="188" height="84" rx="11"/>
  <text x="938" y="173" class="t" font-size="15" text-anchor="middle">Go worker</text>
  <text x="938" y="192" class="s" font-size="10.5" text-anchor="middle">consume · map · batch · flush</text>
  <text x="938" y="210" class="s" font-size="10.5" text-anchor="middle">commit offsets after flush</text>

  <rect class="box b-click" x="1080" y="150" width="168" height="62" rx="11"/>
  <text x="1164" y="178" class="t" font-size="15" text-anchor="middle">ClickHouse</text>
  <text x="1164" y="196" class="s mono" font-size="10" text-anchor="middle">ReplacingMergeTree</text>

  <rect class="box b-graf" x="1080" y="240" width="168" height="62" rx="11"/>
  <text x="1164" y="268" class="t" font-size="15" text-anchor="middle">Grafana</text>
  <text x="1164" y="286" class="s" font-size="10.5" text-anchor="middle">live analytics dashboard</text>

  <!-- ===== worker internal pipeline (sub-tree) ===== -->
  <rect class="cont" x="360" y="330" width="620" height="120" rx="12"/>
  <text x="376" y="354" class="s" font-size="11" text-anchor="start">Go worker - internal pipeline (per message)</text>

  <g>
    <rect class="stage" x="376" y="376" width="82" height="56" rx="8">
      <animate attributeName="stroke" values="#2a3645;#4fb3c1;#2a3645;#2a3645" keyTimes="0;0.09;0.22;1" dur="3s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="417" y="401" class="t" font-size="11.5" text-anchor="middle">Consumer</text>
    <text x="417" y="417" class="s" font-size="9" text-anchor="middle">read topic</text>
    <text x="466" y="408" class="edge" font-size="14" text-anchor="middle">&#8250;</text>

    <rect class="stage" x="476" y="376" width="82" height="56" rx="8">
      <animate attributeName="stroke" values="#2a3645;#4fb3c1;#2a3645;#2a3645" keyTimes="0;0.09;0.22;1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="517" y="401" class="t" font-size="11.5" text-anchor="middle">Parser</text>
    <text x="517" y="417" class="s" font-size="9" text-anchor="middle">DBZ JSON</text>
    <text x="566" y="408" class="edge" font-size="14" text-anchor="middle">&#8250;</text>

    <rect class="stage" x="576" y="376" width="82" height="56" rx="8">
      <animate attributeName="stroke" values="#2a3645;#4fb3c1;#2a3645;#2a3645" keyTimes="0;0.09;0.22;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="617" y="401" class="t" font-size="11.5" text-anchor="middle">Mapper</text>
    <text x="617" y="417" class="s" font-size="9" text-anchor="middle">to CH row</text>
    <text x="666" y="408" class="edge" font-size="14" text-anchor="middle">&#8250;</text>

    <rect class="stage" x="676" y="376" width="82" height="56" rx="8">
      <animate attributeName="stroke" values="#2a3645;#4fb3c1;#2a3645;#2a3645" keyTimes="0;0.09;0.22;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="717" y="401" class="t" font-size="11.5" text-anchor="middle">Batcher</text>
    <text x="717" y="417" class="s" font-size="9" text-anchor="middle">size / time</text>
    <text x="766" y="408" class="edge" font-size="14" text-anchor="middle">&#8250;</text>

    <rect class="stage" x="776" y="376" width="82" height="56" rx="8">
      <animate attributeName="stroke" values="#2a3645;#4fb3c1;#2a3645;#2a3645" keyTimes="0;0.09;0.22;1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <text x="817" y="401" class="t" font-size="11.5" text-anchor="middle">Sink</text>
    <text x="817" y="417" class="s" font-size="9" text-anchor="middle">INSERT</text>
    <text x="866" y="408" class="edge" font-size="14" text-anchor="middle">&#8250;</text>

    <rect class="stage" x="876" y="376" width="82" height="56" rx="8">
      <animate attributeName="stroke" values="#2a3645;#4fb3c1;#2a3645;#2a3645" keyTimes="0;0.09;0.22;1" dur="3s" begin="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="917" y="401" class="t" font-size="11.5" text-anchor="middle">Commit</text>
    <text x="917" y="417" class="s" font-size="9" text-anchor="middle">after flush</text>
  </g>

  <!-- ===== observability ===== -->
  <rect class="box b-prom" x="360" y="556" width="200" height="58" rx="11"/>
  <text x="460" y="582" class="t" font-size="15" text-anchor="middle">Prometheus</text>
  <text x="460" y="600" class="s" font-size="10.5" text-anchor="middle">pulls worker /metrics</text>
  <text x="572" y="600" class="lbl" font-size="10" text-anchor="start">OBSERVABILITY</text>

  <!-- ===== animated event particles (on top) ===== -->
  <g filter="url(#glow)">
    <!-- PG -> Debezium -->
    <circle r="3.6" class="evt"><animateMotion dur="0.85s" begin="0s"    repeatCount="indefinite" path="M202,185 H251"/></circle>
    <circle r="3.6" class="evt"><animateMotion dur="0.85s" begin="0.42s" repeatCount="indefinite" path="M202,185 H251"/></circle>
    <!-- Debezium -> Kafka -->
    <circle r="3.6" class="evt"><animateMotion dur="0.85s" begin="0.2s"  repeatCount="indefinite" path="M417,185 H466"/></circle>
    <circle r="3.6" class="evt"><animateMotion dur="0.85s" begin="0.62s" repeatCount="indefinite" path="M417,185 H466"/></circle>
    <!-- Kafka -> topic orders -->
    <circle r="3.6" class="evt"><animateMotion dur="1.5s" begin="0s"   repeatCount="indefinite" path="M586,185 H611 V140 H636"/></circle>
    <circle r="3.6" class="evt"><animateMotion dur="1.5s" begin="0.75s" repeatCount="indefinite" path="M586,185 H611 V140 H636"/></circle>
    <!-- Kafka -> topic customers -->
    <circle r="3.6" class="evt2"><animateMotion dur="1.5s" begin="0.35s" repeatCount="indefinite" path="M586,185 H611 V230 H636"/></circle>
    <circle r="3.6" class="evt2"><animateMotion dur="1.5s" begin="1.1s"  repeatCount="indefinite" path="M586,185 H611 V230 H636"/></circle>
    <!-- topic orders -> worker -->
    <circle r="3.6" class="evt"><animateMotion dur="1.5s" begin="0s"   repeatCount="indefinite" path="M786,140 H815 V185 H844"/></circle>
    <circle r="3.6" class="evt"><animateMotion dur="1.5s" begin="0.75s" repeatCount="indefinite" path="M786,140 H815 V185 H844"/></circle>
    <!-- topic customers -> worker -->
    <circle r="3.6" class="evt2"><animateMotion dur="1.5s" begin="0.35s" repeatCount="indefinite" path="M786,230 H815 V185 H844"/></circle>
    <circle r="3.6" class="evt2"><animateMotion dur="1.5s" begin="1.1s"  repeatCount="indefinite" path="M786,230 H815 V185 H844"/></circle>
    <!-- worker -> ClickHouse (batched) -->
    <circle r="4.2" class="evt"><animateMotion dur="1.0s" begin="0s"   repeatCount="indefinite" path="M1032,185 H1056 V181 H1080"/></circle>
    <!-- ClickHouse -> Grafana -->
    <circle r="3.6" class="evt"><animateMotion dur="0.7s" begin="0s"   repeatCount="indefinite" path="M1164,212 V240"/></circle>
    <!-- worker -> internal pipeline -->
    <circle r="3.6" class="evt"><animateMotion dur="1.2s" begin="0s"   repeatCount="indefinite" path="M938,227 V300 H670 V330"/></circle>
    <!-- traveling dot through the internal stages -->
    <circle r="4" class="evt"><animateMotion dur="3s" begin="0s" repeatCount="indefinite" path="M417,404 H917"/></circle>
  </g>

  <!-- ===== footer ===== -->
  <text x="36" y="660" class="s" font-size="11.5">At-least-once delivery, exactly-once in effect: offsets commit only after the ClickHouse flush, and ReplacingMergeTree collapses any replay on _version.</text>
  <text x="36" y="680" class="s" font-size="11.5">See DESIGN.md for the full rationale and ROADMAP.md for the phase-by-phase build plan.</text>
</svg>
</body>
</html>
