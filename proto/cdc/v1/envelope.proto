syntax = "proto3";

package cdc.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/khangpt2k6/CDC/internal/gen/cdc/v1;cdcv1";

// Op is the kind of change a single Envelope represents.
//
// Null-ness rules for the before/after row images, by op:
//   OP_INSERT    - before is null, after is the new row.
//   OP_UPDATE    - after is the new row; before carries the old image
//                  (full row under REPLICA IDENTITY FULL, key columns otherwise).
//   OP_DELETE    - after is null; before carries the deleted row image.
//   OP_SNAPSHOT  - before is null, after is the row as read during initial load.
//   OP_HEARTBEAT - both before and after are null; the event only advances
//                  position so the source slot can release retained WAL.
enum Op {
  OP_UNSPECIFIED = 0;
  OP_INSERT = 1;
  OP_UPDATE = 2;
  OP_DELETE = 3;
  OP_SNAPSHOT = 4;
  OP_HEARTBEAT = 5;
}

// Field is one named, typed column value within a Row.
//
// The value is carried as a oneof over scalar types so column types survive
// schema drift (unlike opaque JSON). A present Field with is_null = true models
// a SQL NULL; a column that is absent from the Row entirely (no Field) is
// distinct from NULL - it means the value is unknown (e.g. an unchanged TOAST
// column, or a key-only before-image under the default replica identity).
message Field {
  // Column name as known to the source schema.
  string name = 1;
  // Source column type name (e.g. "int4", "text", "timestamptz"), preserved
  // for downstream consumers and type-aware sinks.
  string type = 2;
  // True when the column value is SQL NULL. When true, no value oneof is set.
  bool is_null = 3;

  // The typed column value. Unset when is_null is true.
  oneof value {
    int64 int_value = 10;
    double double_value = 11;
    bool bool_value = 12;
    string string_value = 13;
    bytes bytes_value = 14;
  }
}

// Row is an ordered set of named, typed column values.
//
// Absence of a Field for a column is meaningful (see Field): it represents an
// unknown/unchanged value, which is distinct from a present Field marked
// is_null.
message Row {
  repeated Field fields = 1;
}

// Source identifies where a change originated.
message Source {
  // Logical connector name that produced the event.
  string connector = 1;
  // Source database name.
  string db = 2;
  // Source schema/namespace name.
  string schema = 3;
  // Source table/collection name.
  string table = 4;
  // Tenant that owns this source (denormalized for routing/isolation).
  string tenant_id = 5;
  // Source transaction id, when the source exposes one.
  optional uint64 txid = 6;
}

// Envelope is the canonical CDC change event. Every source emits it and every
// sink consumes it; the contract is fixed here before any producer or consumer
// is written.
message Envelope {
  // The kind of change. Governs which of before/after are set (see Op).
  Op op = 1;
  // Row image before the change. See Op for null-ness rules.
  Row before = 2;
  // Row image after the change. See Op for null-ness rules.
  Row after = 3;
  // Where the change originated.
  Source source = 4;
  // Source position as a canonical string. For streamed events this is the
  // commit LSN (e.g. "0/16B3748"); for snapshot events it is the snapshot's
  // consistent point. It is monotonic per source stream and drives ordering
  // and offset commits.
  string position = 5;
  // Identifier of the payload schema in the schema registry (Phase 3). Lets
  // consumers decode before/after safely across schema versions.
  uint64 schema_id = 6;
  // Commit timestamp of the change at the source.
  google.protobuf.Timestamp ts = 7;
  // Tenant that owns this event (authoritative for multi-tenant routing).
  string tenant_id = 8;

  // Reserved for future additions so new fields never collide with in-flight
  // experiments or downstream extensions.
  reserved 50 to 99;
}
