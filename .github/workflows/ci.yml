name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: build / vet / test / lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run

  e2e:
    name: end-to-end (compose)
    runs-on: ubuntu-latest
    # Isolated from the fast unit job above: it runs in parallel and has its own
    # green/red signal, so a slow or flaky e2e never gates the quick feedback.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      # Brings up the full Postgres -> Debezium -> Kafka -> ClickHouse stack,
      # registers the connector, runs the worker, and asserts the snapshot lands
      # and live changes stream through with no loss or duplicates. All data
      # queries run inside the containers, so no psql/clickhouse-client on the host.
      - name: End-to-end snapshot + streaming assertion
        run: bash deploy/verify-snapshot.sh --fresh

      # On failure, surface what the worker and the stack were doing so the run is
      # debuggable from the logs alone.
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "==== worker log ===="
          cat verify-worker.log || true
          echo "==== docker compose ps ===="
          docker compose ps || true
          echo "==== docker compose logs ===="
          docker compose logs --no-color --tail=200 || true

      # Always tear the stack down and drop volumes so the runner ends clean.
      - name: Tear down
        if: always()
        run: docker compose down -v || true
