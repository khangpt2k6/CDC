name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly catch for newly disclosed vulnerabilities in pinned deps.
    - cron: "0 6 * * 1"

# Least privilege by default; jobs that upload findings opt into more below.
permissions:
  contents: read

jobs:
  # Go vulnerability scan against the standard library and our dependency graph.
  # Gates: fails the build on a vulnerability our code actually calls.
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Static security analysis of our Go code. Gates on findings (the tree is
  # currently clean) and also uploads SARIF to the Security tab.
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true
      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sarif -out gosec.sarif ./... || true
          gosec ./...
      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
          category: gosec

  # CodeQL semantic analysis for Go. Reports to the Security tab; does not gate.
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  # Trivy scans the repo for vulnerable dependencies and misconfigured IaC
  # (docker-compose). Report only: it uploads SARIF and never fails the build,
  # so upstream base-image CVEs we cannot patch do not block a merge.
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      # Install the CLI directly so we never depend on a marketplace action tag.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
      - name: Trivy filesystem and config scan
        # Report only: exit 0 so upstream base-image CVEs we cannot patch never
        # block a merge; findings still surface in the Security tab.
        run: |
          trivy fs \
            --scanners vuln,misconfig,secret \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            --exit-code 0 \
            .
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy

  # Secret scanning across the working tree and history. Gates on a real leak;
  # .env.example local-dev defaults are allowlisted in .gitleaks.toml.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # Required by the action to read PR metadata. Free for public repos
          # and personal accounts (no license key needed).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # On pull requests, block any dependency change that introduces a known
  # vulnerability or an incompatible license.
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Non-blocking: needs the repo Dependency graph enabled. govulncheck, Trivy,
    # and Dependabot already gate on vulnerable dependencies, so this is an extra
    # signal rather than a hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
