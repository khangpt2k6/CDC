# Local development stack for the CDC pipeline.
#
# Postgres (logical replication) -> Debezium (Kafka Connect) -> Kafka
#   -> Go consumer -> ClickHouse.
#
# Host connection details (see README "Local stack"):
#   Postgres       localhost:5432           user/pass/db = cdc / cdc / cdc
#   Kafka          localhost:29092          PLAINTEXT_HOST listener
#   Kafka Connect  http://localhost:8083    Debezium connector REST API
#   ClickHouse     localhost:8123 (HTTP)    user/pass/db = cdc / cdc / cdc
#                  localhost:9000 (native)
#
# All credentials here are local-only dev defaults. Do not reuse them anywhere.

name: cdc-local

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: cdc-kafka
    ports:
      - "29092:29092" # host access
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Internal (PLAINTEXT) for in-network clients, PLAINTEXT_HOST for the host.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Debezium and the demo topics are created on demand by Connect.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    volumes:
      - kafka-data:/var/lib/kafka/data

  postgres:
    image: postgres:17
    container_name: cdc-postgres
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "wal_sender_timeout=60s"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cdc
      POSTGRES_PASSWORD: cdc
      POSTGRES_DB: cdc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc -d cdc"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro

  # Kafka Connect with the Debezium connectors bundled in. Captures Postgres
  # changes via the pgoutput logical decoding plugin and writes them to Kafka.
  connect:
    image: quay.io/debezium/connect:3.0
    container_name: cdc-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083" # Connect REST API
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: cdc-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # Columnar analytics store. The Go consumer batches change events into it.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: cdc-clickhouse
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native protocol
    environment:
      CLICKHOUSE_DB: cdc
      CLICKHOUSE_USER: cdc
      CLICKHOUSE_PASSWORD: cdc
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse:/docker-entrypoint-initdb.d:ro

volumes:
  kafka-data:
  postgres-data:
  clickhouse-data:
