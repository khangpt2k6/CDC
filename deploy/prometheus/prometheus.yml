# Prometheus scrape config for the CDC stack.
#
# In compose the worker runs as three instances (worker1/2/3), each serving
# /metrics on :9100 (CDC_METRICS_ADDR) and reachable by service name on the
# compose network. For single-worker host dev (`make run`) the worker serves on
# the host, reachable from this container as host.docker.internal:9100 (mapped to
# the host gateway via extra_hosts in docker-compose.yml) -- add that target back
# to the list below when running the worker on the host instead of in compose.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: cdc-worker
    static_configs:
      - targets: ["worker1:9100", "worker2:9100", "worker3:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
